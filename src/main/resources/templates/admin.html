<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
</head>
<body>
<h1>Admin Panel</h1>

<h2>User List</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.roles}"></td>
        <td>
            <button th:onclick="'editUser(' + ${user.id} + ')'">Edit</button>
            <form th:action="@{/admin/delete}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${user.id}">
                <button type="submit" onclick="return confirm('Delete?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2>Add/Edit User</h2>
<form th:action="@{/admin/add}" method="post" th:object="${newUser}">
    <label>Username: <input type="text" name="username" required></label><br>
    <label>Password: <input type="password" name="password" required></label><br>
    <label>First Name: <input type="text" name="firstName" required></label><br>
    <label>Last Name: <input type="text" name="lastName" required></label><br>
    <label>Email: <input type="email" name="email" required></label><br>
    <label>Roles:
        <select name="roleIds" multiple>
            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
        </select>
    </label><br>
    <button type="submit">Save</button>
</form>

<form th:action="@{/logout}" method="post">
    <button type="submit">Logout</button>
</form>

<script>
    function editUser(id) {
        window.location.href = '/admin/edit?id=' + id;
    }
</script>
</body>
</html>
